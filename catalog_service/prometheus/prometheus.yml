global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'catalog_service'
    metrics_path: '/metrics'
    scrape_interval: 10s
    static_configs:
      - targets: ['catalog:8000']

  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node_exporter:9100']